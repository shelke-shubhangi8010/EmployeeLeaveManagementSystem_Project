<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Employee</title>

<style>
body {
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
}
.box {
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:350px;
}
h2 { text-align:center; color:#2575fc; }
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button {
    width:100%;
    padding:10px;
    background:#6a11cb;
    color:white;
    border:none;
    border-radius:8px;
}
button:hover { background:#2575fc; }
</style>

</head>
<body>

<div class="box">
<h2>Add Employee</h2>

<form action="AddEmployeeServlet" method="post">
<input type="text" name="name" placeholder="Enter Name" required>
<input type="email" name="email" placeholder="Enter Email" required>

<button type="submit">Add Employee</button>
</form>

</div>

</body>
</html>
