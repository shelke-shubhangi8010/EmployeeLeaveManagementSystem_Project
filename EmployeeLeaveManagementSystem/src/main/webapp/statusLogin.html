<!DOCTYPE html>
<html>
<head>
<title>Login to View Status</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #2575fc;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #2575fc;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1a5ed9;
}

</style>

</head>
<body>

<div class="container">

<h2>View Leave Status</h2>

<form action="StatusLoginServlet" method="post">

<input type="text" name="username" placeholder="Enter Username" required><br>

<input type="password" name="password" placeholder="Enter Password" required><br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
